services:
  9router:
    build:
      context: .
      dockerfile: Dockerfile.9router
      args:
        NINEROUTER_VERSION: "${NINEROUTER_VERSION:-latest}"
    container_name: 9router
    restart: unless-stopped
    ports:
      - "${ROUTER_PORT:-20128}:20128"
    volumes:
      - ${NINEROUTER_DATA_DIR:-/home/firman/.9router}:/app/data
    command: ["9router", "--no-browser", "--skip-update"]
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - HOSTNAME=0.0.0.0
      # Cap V8 heap below the 1G container limit (Node default ~1.5GB would OOM-kill)
      - NODE_OPTIONS=--max-old-space-size=768
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    memswap_limit: 2g
    container_name: headroom
    restart: unless-stopped
    expose:
      - "8787"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          # Kompress-v2-base (HuggingFace transformer) + AST/image ML compressors need ~500MB-1GB loaded
          memory: 2G
        reservations:
          cpus: "0.1"
          memory: 256M
  9router-webui:
    profiles: [webui]
    image: ghcr.io/open-webui/open-webui:main
    container_name: 9router-webui
    restart: unless-stopped
    depends_on:
      - 9router
    ports:
      - "${WEBUI_PORT:-20129}:8080"
    volumes:
      - ${WEBUI_DATA_DIR:-/home/firman/.9router-webui}:/app/backend/data
    environment:
      # Points straight at 9router's OpenAI-compatible endpoint, container-to-container
      - OPENAI_API_BASE_URL=http://9router:20128/v1
      # Put your real 9router dashboard API key here (Dashboard -> API Keys)
      - OPENAI_API_KEY=${NINEROUTER_API_KEY:-changeme}
      # No local Ollama models, so don't bother probing for them
      - ENABLE_OLLAMA_API=false
      # Skip the signup wall for a single-user local test UI; set true if you want accounts
      - WEBUI_AUTH=false
      - WEBUI_NAME=9router Tester
      # Cuts the 10-15s "fetching models" delay on every page load
      - ENABLE_BASE_MODELS_CACHE=true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
  omniroute:
    profiles: [omniroute]
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    depends_on:
      - qdrant
    ports:
      - "${OMNIROUTE_PORT:-20130}:20128"
    volumes:
      - omniroute-data:/app/data
    environment:
      - QDRANT_URL=http://qdrant:6333
      # Align Node heap ceiling with container memory limit (default unset = 512MB)
      - OMNIROUTE_MEMORY_MB=400
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
  qdrant:
    profiles: [omniroute]
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant-data:/qdrant/storage
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M
  proxy:
    image: ghcr.io/firmantr3/9router-proxy:latest
    container_name: 9router-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-20131}:20128"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ${PROXY_CONFIG_DIR:-.}/strip.json:/app/strip.json:ro
      - ${PROXY_CONFIG_DIR:-.}/inject.json:/app/inject.json:ro
    environment:
      - PORT=20128
      - TARGET_URL=http://9router:20128
      - VERBOSE_LOG=${VERBOSE_LOG:-false}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
volumes:
  omniroute-data:
  qdrant-data:
